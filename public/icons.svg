<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sunGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5d76e"/>
      <stop offset="40%" stop-color="#f39c12"/>
      <stop offset="100%" stop-color="#e67e22"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5d76e" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#f39c12" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#f39c12" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Glow do sol -->
  <circle cx="256" cy="180" r="140" fill="url(#sunGlow)"/>
  
  <!-- Raios do sol -->
  <g stroke="#f5d76e" stroke-width="3" stroke-linecap="round" opacity="0.5">
    <line x1="256" y1="50" x2="256" y2="80"/>
    <line x1="256" y1="280" x2="256" y2="310"/>
    <line x1="126" y1="180" x2="156" y2="180"/>
    <line x1="356" y1="180" x2="386" y2="180"/>
    <line x1="168" y1="92" x2="190" y2="114"/>
    <line x1="322" y1="246" x2="344" y2="268"/>
    <line x1="168" y1="268" x2="190" y2="246"/>
    <line x1="322" y1="114" x2="344" y2="92"/>
  </g>
  
  <!-- Raios secundários -->
  <g stroke="#f5d76e" stroke-width="1.5" stroke-linecap="round" opacity="0.25">
    <line x1="210" y1="62" x2="218" y2="92"/>
    <line x1="302" y1="62" x2="294" y2="92"/>
    <line x1="210" y1="298" x2="218" y2="268"/>
    <line x1="302" y1="298" x2="294" y2="268"/>
    <line x1="92" y1="142" x2="122" y2="150"/>
    <line x1="92" y1="218" x2="122" y2="210"/>
    <line x1="390" y1="142" x2="360" y2="150"/>
    <line x1="390" y1="218" x2="360" y2="210"/>
  </g>
  
  <!-- Sol -->
  <circle cx="256" cy="180" r="70" fill="url(#sunGrad)" filter="url(#glow)"/>
  
  <!-- Destaque do sol -->
  <ellipse cx="238" cy="158" rx="30" ry="24" fill="#fff7b0" opacity="0.15"/>
  
  <!-- Texto principal -->
  <text x="256" y="310" text-anchor="middle" fill="#f5d76e" font-family="'Courier New', monospace" font-size="28" font-weight="bold" letter-spacing="5" filter="url(#textGlow)">TURING'S</text>
  
  <!-- Subtítulo -->
  <text x="256" y="345" text-anchor="middle" fill="#f39c12" font-family="'Courier New', monospace" font-size="20" letter-spacing="8" opacity="0.85">SOLSTICE</text>
  
  <!-- Linha decorativa -->
  <rect x="176" y="358" width="160" height="1.5" rx="0.75" fill="#f5d76e" opacity="0.15"/>
</svg>